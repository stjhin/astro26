name: Sync Resume from Google Docs

on:
  schedule:
    - cron: "0 6 * * *"          # daily at 06:00 UTC
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write                 # needed to commit the updated PDF

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Export resume PDF from Google Docs
        env:
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.RESUME }}
          RESUME_DOC_ID:           ${{ secrets.GoogleDocID }}
          RESUME_OUTPUT_PATH:      public/Resume-Ju2026.pdf
        run: node scripts/sync-resume.mjs

      - name: Commit updated resume
        run: |
          if git diff --quiet public/Resume-Ju2026.pdf; then
            echo "No changes to resume PDF."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/Resume-Ju2026.pdf
            git commit -m "chore: sync resume PDF from Google Docs"
            git push
          fi
